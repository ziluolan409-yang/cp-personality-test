<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>嗑CP人格属性测试</title>
<!-- 字体：通过国内CDN镜像加载 Google Fonts（防屏蔽） -->
<link rel="preconnect" href="https://fonts.loli.net">
<link href="https://fonts.loli.net/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   CSS 变量 & 全局重置 — 日记本纸张风格
   ============================================================ */
:root {
  --paper: #fbf6e8;
  --paper-dark: #f0e8d0;
  --card-bg: #fffef7;
  --card-shadow: rgba(120, 100, 70, 0.10);
  --text: #3d3025;
  --text-light: #7a6b58;
  --text-muted: #a89880;
  --crayon-brown: #b8956e;
  --crayon-orange: #d4956b;
  --crayon-blue: #7eb8c9;
  --crayon-green: #8db580;
  --crayon-pink: #d4869b;
  --crayon-purple: #b89bc4;
  --crayon-yellow: #c9a940;
  --accent: #c77d5a;
  --accent-warm: #d4956b;
  --font-hand: 'Ma Shan Zheng', 'STKaiti', 'KaiTi', 'STXingkai', cursive;
  --font-song: 'Noto Serif SC', 'STSong', 'Songti SC', 'SimSun', 'PMingLiU', serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { font-size: 16px; scroll-behavior: smooth; }

body {
  background-color: var(--paper);
  /* 日记本横线纹理 */
  background-image:
    repeating-linear-gradient(
      0deg,
      transparent,
      transparent 27px,
      rgba(180, 160, 120, 0.15) 27px,
      rgba(180, 160, 120, 0.15) 28px
    ),
    /* 左侧装订线 */
    linear-gradient(
      90deg,
      rgba(200, 160, 140, 0.12) 0px,
      rgba(200, 160, 140, 0.12) 1px,
      transparent 1px
    );
  background-size: 100% 28px, 100% 100%;
  background-position: 0 0, 0 0;
  color: var(--text);
  font-family: var(--font-song);
  min-height: 100vh;
  line-height: 1.8;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 20px 16px;
}

/* ============================================================
   主容器
   ============================================================ */
#app {
  width: 100%;
  max-width: 600px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  position: relative;
  z-index: 1;
}

/* ============================================================
   卡片 — 日记本撕纸风格
   ============================================================ */
.card {
  background: var(--card-bg);
  border: 2px solid rgba(180, 160, 120, 0.25);
  border-radius: 4px 16px 6px 12px;
  box-shadow:
    3px 3px 8px var(--card-shadow),
    -1px -1px 4px rgba(0,0,0,0.03),
    /* 撕纸毛边 */
    inset 0 0 0 1px rgba(255,255,255,0.6);
  padding: 28px 22px;
  margin-bottom: 18px;
  position: relative;
}

/* 撕纸效果：顶部不规则边缘 */
.card::before {
  content: '';
  position: absolute;
  top: -1px;
  left: 8px;
  right: 8px;
  height: 3px;
  background:
    repeating-linear-gradient(
      90deg,
      transparent 0px,
      var(--card-bg) 2px,
      transparent 3px,
      var(--card-bg) 5px,
      transparent 6px,
      var(--card-bg) 8px
    );
}

/* ============================================================
   蜡笔圈手绘选项按钮
   ============================================================ */
.option-btn {
  display: block;
  width: 100%;
  text-align: left;
  background: var(--card-bg);
  border: 2.5px solid var(--crayon-brown);
  border-radius: 22px 14px 24px 16px;
  color: var(--text);
  font-family: var(--font-song);
  font-size: 0.9rem;
  padding: 14px 18px;
  cursor: pointer;
  /* 蜡笔双重描边 */
  box-shadow:
    1.5px 1.5px 0 var(--crayon-orange),
    3px 3px 0 rgba(180, 140, 100, 0.25);
  transition: all 0.15s ease;
  margin-bottom: 12px;
  line-height: 1.7;
  position: relative;
  outline: none;
}

/* 蜡笔涂抹质感 */
.option-btn::after {
  content: '';
  position: absolute;
  inset: -3px;
  border-radius: 24px 16px 26px 18px;
  border: 1.5px solid var(--crayon-brown);
  opacity: 0.35;
  pointer-events: none;
  transform: translate(1px, -1px);
}

.option-btn:hover {
  background: rgba(200, 160, 120, 0.06);
  transform: translate(1px, 1px);
  box-shadow:
    1px 1px 0 var(--crayon-orange),
    2px 2px 0 rgba(180, 140, 100, 0.2);
}

.option-btn:active {
  background: rgba(200, 160, 120, 0.12);
  transform: translate(2px, 2px);
  box-shadow: none;
}

.option-btn.selected {
  background: rgba(200, 150, 100, 0.13);
  border-color: var(--accent);
  box-shadow:
    1.5px 1.5px 0 var(--accent),
    3px 3px 0 rgba(180, 120, 80, 0.2),
    inset 0 0 20px rgba(200, 150, 100, 0.06);
}

.option-btn.selected::after {
  border-color: var(--accent);
  opacity: 0.45;
}

.option-label {
  display: inline-block;
  color: var(--accent-warm);
  font-family: var(--font-hand);
  font-size: 1rem;
  margin-right: 8px;
  min-width: 18px;
}

/* ============================================================
   按钮样式
   ============================================================ */

/* 主操作按钮 — 手绘风 */
.btn-primary {
  display: inline-block;
  width: auto;
  text-align: center;
  background: var(--accent);
  border: 2px solid var(--accent);
  border-radius: 20px 10px 22px 12px;
  color: #fffef7;
  font-family: var(--font-hand);
  font-size: 1.15rem;
  padding: 12px 36px;
  cursor: pointer;
  box-shadow:
    2px 2px 0 #b06840,
    4px 4px 0 rgba(180, 120, 80, 0.2);
  transition: all 0.12s ease;
  letter-spacing: 2px;
}

.btn-primary:hover {
  background: #d48560;
  transform: translate(1px, 1px);
  box-shadow:
    1px 1px 0 #b06840,
    2px 2px 0 rgba(180, 120, 80, 0.15);
}

.btn-primary:active {
  transform: translate(3px, 3px);
  box-shadow: none;
}

/* 次要按钮 */
.btn-secondary {
  display: inline-block;
  width: auto;
  text-align: center;
  background: transparent;
  border: 2px solid var(--text-muted);
  border-radius: 16px 8px 18px 10px;
  color: var(--text-light);
  font-family: var(--font-hand);
  font-size: 0.95rem;
  padding: 10px 24px;
  cursor: pointer;
  box-shadow: 1.5px 1.5px 0 rgba(160, 140, 110, 0.3);
  transition: all 0.12s ease;
}

.btn-secondary:hover {
  color: var(--text);
  border-color: var(--text-light);
  box-shadow: 1.5px 1.5px 0 rgba(140, 120, 90, 0.3);
}

/* ============================================================
   屏幕切换
   ============================================================ */
.screen { display: none; }
.screen.active {
  display: flex;
  flex-direction: column;
  animation: fadeSlideIn 0.35s ease;
}

@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ============================================================
   首页
   ============================================================ */
.start-header {
  text-align: center;
  margin-bottom: 24px;
}

.start-icon {
  font-size: 2.8rem;
  display: block;
  margin-bottom: 10px;
  animation: gentleFloat 2.5s ease-in-out infinite;
}

@keyframes gentleFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-5px); }
}

.start-title {
  font-family: var(--font-hand);
  font-size: 1.6rem;
  color: var(--accent);
  letter-spacing: 3px;
  margin-bottom: 6px;
  line-height: 1.4;
}

.start-subtitle {
  font-family: var(--font-song);
  font-size: 0.85rem;
  color: var(--text-light);
  letter-spacing: 2px;
}

.start-desc {
  text-align: center;
  font-family: var(--font-song);
  font-size: 0.85rem;
  color: var(--text-light);
  line-height: 1.9;
  margin-bottom: 10px;
}

.start-desc strong { color: var(--accent); font-weight: 600; }
.start-desc .highlight { color: var(--crayon-purple); }

.dim-intro {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 24px;
}

.dim-tag {
  background: rgba(200, 180, 150, 0.08);
  border: 1.5px solid rgba(180, 160, 120, 0.2);
  border-radius: 8px 16px 8px 14px;
  padding: 12px 14px;
  text-align: center;
  font-family: var(--font-song);
  font-size: 0.78rem;
}

.dim-tag .dim-label {
  color: var(--accent);
  font-family: var(--font-hand);
  font-size: 0.9rem;
}
.dim-tag .dim-desc {
  color: var(--text-light);
  font-size: 0.72rem;
}

.start-btn-wrap { text-align: center; }

/* ============================================================
   答题页
   ============================================================ */
.quiz-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
  font-family: var(--font-song);
  font-size: 0.82rem;
  color: var(--text-light);
}

.quiz-qnum {
  font-family: var(--font-hand);
  color: var(--accent);
  font-size: 0.95rem;
  letter-spacing: 2px;
}

.quiz-status {
  font-family: var(--font-song);
  font-size: 0.75rem;
}

/* 进度条 — 日记本风格 */
.quiz-progress-wrap {
  background: rgba(200, 180, 150, 0.1);
  border: 1px solid rgba(180, 160, 120, 0.2);
  border-radius: 10px;
  height: 12px;
  margin-bottom: 22px;
  position: relative;
  overflow: hidden;
}

.quiz-progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--crayon-orange), var(--accent));
  border-radius: 10px;
  transition: width 0.35s ease;
}

.quiz-progress-text {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-family: var(--font-song);
  font-size: 0.6rem;
  color: var(--text-light);
  white-space: nowrap;
}

.quiz-question {
  font-family: var(--font-song);
  font-size: 1rem;
  color: var(--text);
  margin-bottom: 20px;
  line-height: 1.9;
  padding: 14px 16px;
  background: rgba(200, 180, 150, 0.06);
  border-left: 3px solid var(--crayon-yellow);
  border-radius: 2px 10px 10px 2px;
}

.quiz-nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  margin-top: 10px;
}

.quiz-back {
  background: transparent;
  border: none;
  color: var(--text-muted);
  font-family: var(--font-hand);
  font-size: 0.85rem;
  cursor: pointer;
  padding: 8px 12px;
  transition: color 0.15s;
}
.quiz-back:hover { color: var(--accent); }
.quiz-back:disabled { opacity: 0.35; cursor: not-allowed; }

/* ============================================================
   结果页
   ============================================================ */
.result-header {
  text-align: center;
  margin-bottom: 22px;
}

.result-badge {
  display: inline-block;
  font-family: var(--font-hand);
  font-size: 0.72rem;
  color: var(--crayon-yellow);
  background: rgba(200, 170, 60, 0.08);
  border: 1.5px solid rgba(200, 170, 60, 0.3);
  border-radius: 12px;
  padding: 4px 16px;
  letter-spacing: 2px;
  margin-bottom: 14px;
}

.result-personality {
  font-family: var(--font-hand);
  font-size: 1.6rem;
  color: var(--accent);
  letter-spacing: 2px;
  margin-bottom: 10px;
  line-height: 1.4;
}

.result-tagline {
  font-family: var(--font-song);
  font-size: 0.88rem;
  color: var(--crayon-purple);
  font-style: italic;
}

/* 维度分布条 */
.result-dims { margin-bottom: 24px; }

.dim-row {
  display: flex;
  align-items: center;
  margin-bottom: 12px;
  gap: 10px;
}

.dim-name {
  width: 65px;
  text-align: right;
  font-family: var(--font-hand);
  font-size: 0.85rem;
  color: var(--text);
  flex-shrink: 0;
}

.dim-bar-wrap {
  flex: 1;
  height: 16px;
  background: rgba(200, 180, 150, 0.12);
  border: 1px solid rgba(180, 160, 120, 0.15);
  border-radius: 8px;
  position: relative;
  overflow: hidden;
}

.dim-bar-fill {
  height: 100%;
  border-radius: 8px;
  transition: width 0.8s ease;
}

.dim-bar-fill.dim-di   { background: linear-gradient(90deg, #d4869b, #e8a0b0); }
.dim-bar-fill.dim-yuan { background: linear-gradient(90deg, #b89bc4, #d0b8d8); }
.dim-bar-fill.dim-chi  { background: linear-gradient(90deg, #d4b860, #e8d080); }
.dim-bar-fill.dim-yi   { background: linear-gradient(90deg, #7eb8c9, #a0d4e0); }

.dim-label {
  width: 40px;
  font-family: var(--font-song);
  font-size: 0.72rem;
  color: var(--text-muted);
  text-align: center;
  flex-shrink: 0;
}

/* 解读卡片 */
.result-interp {
  background: rgba(200, 180, 150, 0.06);
  border: 2px solid rgba(180, 160, 120, 0.18);
  border-radius: 6px 16px 6px 14px;
  padding: 22px;
  margin-bottom: 20px;
  line-height: 2;
  font-family: var(--font-song);
  font-size: 0.85rem;
  color: var(--text);
}

.result-interp .motto {
  display: block;
  text-align: center;
  color: var(--accent);
  font-family: var(--font-hand);
  font-size: 0.95rem;
  margin-top: 16px;
  padding-top: 16px;
  border-top: 1px dashed rgba(180, 160, 120, 0.25);
  letter-spacing: 1px;
}

/* 音乐播放器区域 */
.music-section {
  margin-bottom: 20px;
  padding: 16px 12px;
  background: rgba(200, 180, 150, 0.04);
  border: 1.5px solid rgba(180, 160, 120, 0.2);
  border-radius: 6px 16px 6px 14px;
  text-align: center;
}

.music-label {
  font-family: var(--font-hand);
  font-size: 0.8rem;
  color: var(--text-muted);
  margin-bottom: 10px;
  letter-spacing: 1px;
}

.music-player {
  display: flex;
  justify-content: center;
}

.music-player iframe {
  max-width: 100%;
}

/* 操作按钮组 */
.result-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  justify-content: center;
}

/* ============================================================
   分隔线
   ============================================================ */
.divider {
  text-align: center;
  color: var(--text-muted);
  font-size: 0.7rem;
  letter-spacing: 6px;
  margin: 18px 0;
  user-select: none;
  opacity: 0.6;
}

/* ============================================================
   完整16型人格弹出层
   ============================================================ */
.modal-overlay {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(60, 40, 20, 0.55);
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  animation: fadeIn 0.25s ease;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.modal-panel {
  background: var(--paper);
  border: 2.5px solid var(--crayon-brown);
  border-radius: 8px 20px 8px 16px;
  box-shadow:
    4px 4px 0 var(--crayon-orange),
    8px 8px 20px rgba(80, 50, 20, 0.25);
  width: 100%;
  max-width: 650px;
  max-height: 80vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.modal-header {
  padding: 18px 22px 14px;
  border-bottom: 1.5px solid rgba(180, 160, 120, 0.25);
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-shrink: 0;
}

.modal-title {
  font-family: var(--font-hand);
  font-size: 1.2rem;
  color: var(--accent);
  letter-spacing: 2px;
}

.modal-close {
  background: none;
  border: 2px solid var(--text-muted);
  border-radius: 50%;
  width: 32px; height: 32px;
  font-size: 1rem;
  cursor: pointer;
  color: var(--text-light);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
  font-family: var(--font-song);
  line-height: 1;
}

.modal-close:hover {
  color: var(--accent);
  border-color: var(--accent);
}

.modal-body {
  padding: 16px 22px 22px;
  overflow-y: auto;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.all-type-card {
  background: var(--card-bg);
  border: 1.5px solid rgba(180, 160, 120, 0.25);
  border-radius: 4px 14px 4px 10px;
  padding: 14px;
  cursor: default;
}

.all-type-card .type-name {
  font-family: var(--font-hand);
  font-size: 0.9rem;
  color: var(--accent);
  margin-bottom: 4px;
  letter-spacing: 1px;
}

.all-type-card .type-tagline {
  font-family: var(--font-song);
  font-size: 0.7rem;
  color: var(--text-light);
  line-height: 1.5;
}

.all-type-card.current-type {
  border-color: var(--accent);
  background: rgba(200, 150, 100, 0.08);
}

.all-type-card.current-type::after {
  content: '👈 你的结果';
  display: block;
  font-family: var(--font-hand);
  font-size: 0.7rem;
  color: var(--accent);
  margin-top: 6px;
  text-align: right;
  letter-spacing: 1px;
}

/* ============================================================
   Toast 提示
   ============================================================ */
.toast {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--text);
  color: var(--paper);
  font-family: var(--font-hand);
  font-size: 0.85rem;
  padding: 10px 24px;
  border-radius: 16px 6px 16px 8px;
  z-index: 9999;
  pointer-events: none;
  animation: toastIn 0.3s ease, toastOut 0.3s 1.5s ease forwards;
  letter-spacing: 2px;
}

@keyframes toastIn  { from { opacity: 0; top: 0; } to { opacity: 1; top: 20px; } }
@keyframes toastOut { from { opacity: 1; } to { opacity: 0; } }

/* ============================================================
   响应式：平板 & 桌面
   ============================================================ */
@media (min-width: 768px) {
  body { padding: 32px; align-items: center; }
  #app { min-height: auto; }
  .card { padding: 36px 30px; }
  .start-title { font-size: 2rem; }
  .quiz-question { font-size: 1.05rem; }
  .option-btn { font-size: 0.95rem; }
  .result-personality { font-size: 1.9rem; }
}

/* ============================================================
   小屏适配
   ============================================================ */
@media (max-width: 480px) {
  .modal-body {
    grid-template-columns: 1fr;
  }
}

@media (max-width: 360px) {
  .card { padding: 18px 14px; }
  .start-title { font-size: 1.3rem; }
  .quiz-question { font-size: 0.85rem; }
  .option-btn { font-size: 0.8rem; padding: 12px 14px; }
  .dim-intro { grid-template-columns: 1fr; }
  .result-personality { font-size: 1.2rem; }
  .all-type-card { padding: 10px; }
}
</style>
</head>
<body>

<main id="app"></main>

<script>
/* ============================================================
   嗑CP人格属性测试 — JavaScript逻辑
   日记本纸张风格 · 增量式更新防卡顿
   ============================================================ */

// ---------- 题目数据 ----------

const QUESTIONS = [
  {
    text: '你关注的一对搭档，最近三个月没有任何公开互动。你现在的状态更接近？',
    options: [
      { label: '三个月？我已经换了两轮新人了，你说的是哪一对来着', scores: [0,0,0,3] },
      { label: '把旧物料翻出来又看了一遍，依然能发现新细节，够我再续半年', scores: [3,0,0,0] },
      { label: '有点焦虑，但默默在等下一次同框——只要来了我就还能继续', scores: [1,1,1,0] },
      { label: '已经开始关注他们各自其他的搭档组合了，旧的不去新的不来', scores: [0,0,1,2] }
    ]
  },
  {
    text: '讨论区里绝大多数人都在嗑甲和丙，只有少数人觉得甲和乙才是真的。你心里觉得甲乙很特别。你会？',
    options: [
      { label: '也开始看看甲丙的内容——万一是我漏掉了什么呢', scores: [0,0,1,1] },
      { label: '反而更上头了——别人嗑不到的那种微妙张力，恰恰说明甲乙的珍贵', scores: [0,3,0,0] },
      { label: '甲乙和甲丙各有各的好，为什么不都嗑呢，又不是结婚只能选一个', scores: [0,0,0,3] },
      { label: '暗戳戳对比甲乙和甲丙的互动证据，试图找到更多支撑自己直觉的论据', scores: [1,2,0,0] }
    ]

const DIM_KEYS  = ['砥', '渊', '炽', '逸'];

// ---------- 状态管理 ----------

const state = {

  currentQ: 0,
  answers: new Array(20).fill(null),
  scores: [0, 0, 0, 0]

const app = document.getElementById('app');

// ---------- 工具函数 ----------

function computeMaxScores() {
  const maxes = [0, 0, 0, 0];
  QUESTIONS.forEach(q => {
    q.options.forEach(opt => {
      for (let i = 0; i < 4; i++) {
        if (opt.scores[i] > maxes[i]) maxes[i] = opt.scores[i];
      }
    });
  });
  return maxes.map(m => m * 20);
}

function recalcScores() {
  state.scores = [0, 0, 0, 0];
  state.answers.forEach((ansIdx, qIdx) => {
    if (ansIdx !== null) {
      const optScores = QUESTIONS[qIdx].options[ansIdx].scores;
      for (let i = 0; i < 4; i++) {
        state.scores[i] += optScores[i];
      }
    }
  });
}

function getPersonalityKey() {
  const [砥, 渊, 炽, 逸] = state.scores;
  const maxScores = computeMaxScores();
  // 阈值设为最大分的35%，与renderResult保持一致
  const thresholds = maxScores.map(m => Math.ceil(m * 0.35));
  return [
    砥 >= thresholds[0] ? 'H' : 'L',
    渊 >= thresholds[1] ? 'H' : 'L',
    炽 >= thresholds[2] ? 'H' : 'L',
    逸 >= thresholds[3] ? 'H' : 'L'
  ].join('');
}

    case 'result': renderResult(); break;

function showAllTypes() {
  const currentKey = getPersonalityKey();

  // 按顺序生成所有类型卡片
  const allKeys = [
    'HHHH','HHHL','HHLH','HHLL',
    'HLHH','HLHL','HLLH','HLLL',
    'LHHH','LHHL','LHLH','LHLL',
    'LLHH','LLHL','LLLH','LLLL'
  ];

  let cardsHTML = allKeys.map(key => {
    const p = PERSONALITIES[key];
    if (!p) return '';
    const isCurrent = (key === currentKey);
    return `
      <div class="all-type-card${isCurrent ? ' current-type' : ''}">
        <div class="type-name">${p.name}</div>
        <div class="type-tagline">「${p.tagline}」</div>
      </div>
    `;
  }).join('');

  const modal = document.createElement('div');
  modal.className = 'modal-overlay';
  modal.id = 'all-types-modal';
  modal.innerHTML = `
    <div class="modal-panel">
      <div class="modal-header">
        <span class="modal-title">📖 完整16型嗑CP人格图鉴</span>
        <button class="modal-close" onclick="closeAllTypes()">✕</button>
      </div>
      <div class="modal-body">
        ${cardsHTML}
      </div>
    </div>
  `;

  // 点击遮罩关闭
  modal.addEventListener('click', function(e) {
    if (e.target === modal) closeAllTypes();
  });

  document.body.appendChild(modal);
  // 防止背景滚动
  document.body.style.overflow = 'hidden';
}

function closeAllTypes() {
  const modal = document.getElementById('all-types-modal');
  if (modal) modal.remove();
  document.body.style.overflow = '';
}

}

function selectAnswer(optIdx) {
  if (state.answers[state.currentQ] === optIdx) return; // 相同选项不重复操作
  state.answers[state.currentQ] = optIdx;
  recalcScores();
  // ★ 增量更新DOM，不重渲染整个页面，消除卡顿
  updateQuizAnswerUI(optIdx);
}

function prevQuestion() {
  if (state.currentQ > 0) {
    state.currentQ--;
    render();
    window.scrollTo({ top: 0, behavior: 'instant' });
  }
}

function nextQuestion() {
  if (state.answers[state.currentQ] === null) return;
  if (state.currentQ < 19) {
    state.currentQ++;
    render();
    window.scrollTo({ top: 0, behavior: 'instant' });
  } else {
    state.screen = 'result';
    render();
    incrementVisitCount();
    window.scrollTo({ top: 0, behavior: 'instant' });
  }
}

function retakeTest() {
  state.screen = 'start';
  state.currentQ = 0;
  state.answers = new Array(20).fill(null);
  state.scores = [0, 0, 0, 0];
  render();
  window.scrollTo({ top: 0, behavior: 'instant' });
}

// ---------- Toast 提示 ----------

function showToast(msg) {
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => {
    if (toast.parentNode) toast.parentNode.removeChild(toast);
  }, 2000);
}

// ---------- 键盘快捷键 ----------

document.addEventListener('keydown', (e) => {
  // 如果弹出层打开，ESC关闭
  if (e.key === 'Escape') {
    const modal = document.getElementById('all-types-modal');
    if (modal) { closeAllTypes(); return; }
  }

  if (state.screen !== 'quiz') return;
  const key = e.key.toUpperCase();
  if (['A', 'B', 'C', 'D'].includes(key)) {
    selectAnswer(key.charCodeAt(0) - 65);
  }
  if (key === 'ENTER') {
    e.preventDefault();
    nextQuestion();
  }
  if (key === 'BACKSPACE' || key === 'ARROWLEFT') {
    e.preventDefault();
    prevQuestion();
  }
});

// ---------- 访问计数 ----------

const COUNTER_NS = 'cp-personality-test';
const COUNTER_KEY = 'completed-tests';
const COUNTER_API = `https://api.countapi.xyz`;

function updateVisitCount() {
  const el = document.getElementById('visit-count');
  if (!el) return;
  fetch(`${COUNTER_API}/get/${COUNTER_NS}/${COUNTER_KEY}`)
    .then(r => r.json())
    .then(data => { el.textContent = data.value || 0; })
    .catch(() => { el.textContent = '许多'; });
}

function incrementVisitCount() {
  fetch(`${COUNTER_API}/hit/${COUNTER_NS}/${COUNTER_KEY}`)
    .then(r => r.json())
    .then(data => {
      const el = document.getElementById('visit-count');
      if (el) el.textContent = data.value;
    })
    .catch(() => {});
}

// 页面加载时获取当前计数
updateVisitCount();

// ---------- 启动 ----------

render();
</script>
</body>
</html>
